<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartera en Mora — Acceso</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1e33;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 1.8rem;
  }
  .logo-icon {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 0.4rem;
  }
  .logo h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #1a2e4a;
    letter-spacing: -0.3px;
  }
  .logo p {
    font-size: 0.8rem;
    color: #64748b;
    margin-top: 2px;
  }
  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: #374151;
    margin-bottom: 0.4rem;
  }
  input[type="password"] {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    transition: border-color 0.2s;
    outline: none;
  }
  input[type="password"]:focus { border-color: #1a2e4a; }
  .btn {
    width: 100%;
    margin-top: 1.2rem;
    padding: 0.75rem;
    background: #1a2e4a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #243d60; }
  .error {
    margin-top: 0.8rem;
    color: #dc2626;
    font-size: 0.82rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">⚖️</span>
    <h1>Cartera en Mora</h1>
    <p>Gestión de clientes — acceso restringido</p>
  </div>
  <form method="POST">
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" autofocus placeholder="••••••••">
    <button type="submit" class="btn">Ingresar</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </form>
</div>
</body>
</html>
